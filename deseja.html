<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Aula 24/06</title>
</head>
<body>
    <header>
        <h1> Sesi 2026 </h1>
    </header>

    <main class="container">
        <section class="informacoes">
            <h2>Sobre o evento</h2>
            <p>Evento destinado a estudantes interessados em tecnologia, inovação e programação</p>
        </section>

        <section class="formulario">
            <h2>Inscrições</h2>

            <form>
                <label>Nome Completo</label>
                <input type="text">
                <label>E-mail</label>
                <input type="email">
                <label>Idade</label>
                <input type="number">
                <label>Curso</label>
                <select>
                    <option>Desenvolvimento de Sistemas</option>
                    <option>Robótica</option>
                    <option>Automação</option>
                </select>
                <label>
                    <input type="checkbox">
                    Aceito os termos
                </label>

                <button type="submit">
                    Inscrever-se
                </button>
            </form>
        </section>
        
    </main>
    <footer>
        Desenvolvido pelo professor Gustavo
    </footer>
</body>
</html>
